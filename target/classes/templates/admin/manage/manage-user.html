<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f3f6f9;
            --border: #d9d9d9;
            --text: #111827;
            --muted: #6b7280;
            --muted-2: #b3b3b3;
            --brand: #009cff;
            --radius-xl: 25px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            color: var(--text);
            background: var(--bg);
        }

        .app {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            padding: 24px 18px;
            border-right: 1px solid rgba(17, 24, 39, 0.06);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar__brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 14px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            margin: 0 6px 18px;
        }

        .sidebar__brandIcon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.18), rgba(0, 156, 255, 0.06));
            display: grid;
            place-items: center;
        }

        .sidebar__brandIcon svg {
            width: 26px;
            height: 26px;
        }

        .sidebar__brandTitle {
            font-weight: 700;
            font-size: 18px;
            line-height: 1.2;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 6px;
        }

        .nav__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text);
        }

        .nav__item:hover {
            background: rgba(243, 246, 249, 0.8);
        }

        .nav__item--active {
            background: var(--surface);
        }

        .nav__icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            flex: 0 0 auto;
            background: rgba(17, 24, 39, 0.06);
            display: grid;
            place-items: center;
        }

        .nav__icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .nav__label {
            font-weight: 500;
            font-size: 16px;
        }

        .nav__item--large {
            padding: 10px 12px;
        }

        .nav__icon--large {
            width: 71px;
            height: 71px;
            border-radius: 20px;
            background: var(--surface);
        }

        .nav__label--large {
            font-weight: 600;
            font-size: 18px;
        }

        .nav__chevron {
            margin-left: auto;
            width: 18px;
            height: 18px;
            opacity: 0.55;
        }

        .sidebar__footer {
            margin-top: auto;
            padding: 0 6px;
        }

        .content {
            flex: 1 1 auto;
            padding: 28px 32px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 26px;
        }

        .topbar__menuBtn {
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            display: grid;
            place-items: center;
            padding: 0;
            cursor: pointer;
        }

        .topbar__menuBtn img {
            width: 30px;
            height: 30px;
            display: block;
        }

        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            width: 320px;
            height: 62px;
            border-radius: 9999px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .search svg {
            width: 18px;
            height: 18px;
            color: var(--muted-2);
        }

        .search input {
            border: 0;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: var(--text);
        }

        .search input::placeholder {
            color: var(--muted-2);
        }

        .topbar__right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .pill {
            font-weight: 500;
            font-size: 16px;
            color: var(--text);
        }

        .iconBtn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 0;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .iconBtn img {
            width: 20px;
            height: 20px;
            display: block;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 9999px;
            background: transparent;
        }

        .profile__avatar {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.22), rgba(17, 24, 39, 0.08));
        }

        .profile__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile__name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
        }

        .profile__dropdown {
            width: 18px;
            height: 18px;
            display: block;
            opacity: 0.65;
        }

        /* --- User Management Styling --- */
        .user-card {
            background-color: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px;
            min-height: 500px;
        }

        .user-card__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .user-card__title {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }

        .btn-add-user {
            background-color: #009cff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
        }

        .user-table th {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 2px solid #ccc;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
        }

        .user-table td {
            padding: 15px 10px;
            font-size: 14px;
            color: #666;
            border-bottom: 1px solid #e0e0e0;
        }

        .action-btns {
            display: flex;
            gap: 4px;
        }

        .btn-act {
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-act--detail { background-color: #f39c12; }
        .btn-act--edit { background-color: #009cff; }
        .btn-act--delete { background-color: #e74c3c; }

        .status-text {
            font-style: italic;
            color: #999;
        }

        .footer {
            margin-top: 8px;
            padding: 18px 0 4px;
            border-top: 1px solid rgba(17, 24, 39, 0.08);
            color: var(--muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer a {
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { padding: 18px; }
            .search { width: 100%; flex: 1 1 auto; }
            .pill { display: none; }
        }
    </style>
</head>

<body>
    <div class="app" th:with="activePage='manage', activeSubPage='user'">
    <aside th:replace="~{admin/fragments_admin/sidebar :: sidebar}"></aside>

    <main class="content">
        <header th:replace="~{admin/fragments_admin/header :: header (searchPlaceholder='Tìm kiếm người dùng...')}"></header>

            <section class="user-card" aria-label="Quản lý người dùng">
                <div class="user-card__header">
                    <h1 class="user-card__title">Quản lý Người dùng</h1>
                    <p th:if="${userLockMessage != null}" class="auth-hint" th:text="${userLockMessage}">---</p>
                </div>

                <div class="tableWrap" style="border: none; background: transparent;">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;">#</th>
                                <th>Tên đăng nhập</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${users == null or #lists.isEmpty(users)}">
                                <td colspan="7">Chưa có user role USER trong hệ thống</td>
                            </tr>
                            <tr th:each="u,iter : ${users}">
                                <td th:text="${iter.count}">1</td>
                                <td th:text="${u.email}">username</td>
                                <td th:text="${u.fullName != null and !#strings.isEmpty(u.fullName) ? u.fullName : 'Chưa cập nhật'}">Họ tên</td>
                                <td th:text="${u.email}">email</td>
                                <td>User</td>
                                <td class="status-text" th:text="${u.status != null ? #strings.toLowerCase(u.status.name()) : 'inactive'}">active</td>
                                <td>
                                    <div class="action-btns">
                                        <a th:href="@{/admin/manage/user-detail(userId=${u.id})}" class="btn-act btn-act--detail" style="text-decoration: none;">Chi tiết</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <footer th:replace="~{admin/fragments_admin/footer :: footer}"></footer>
        </main>
    </div>
</body>

</html>
