<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/user-pages.css}" />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('login')}"></header>
    <main>
      <section class="profile-hero">
        <div class="container">
          <h1>ĐĂNG KÝ</h1>
          <p class="crumb">Home / REGISTER</p>
        </div>
      </section>

      <section class="auth-page">
        <div class="container auth-grid">
          <section class="profile-card auth-side" aria-label="Giới thiệu">
            <h2>SPORT TOURNAMENT</h2>
            <p class="lead">
              Tạo tài khoản để tham gia giải đấu, quản lý đội và theo dõi lịch sử hoạt động.
            </p>
            <div class="auth-info" aria-label="Hỗ trợ">
              <img src="/assets/figma/icon-phone.svg" alt="" />
              <div>0123456789</div>
              <img src="/assets/figma/icon-mail.svg" alt="" />
              <div>sporttournament@example.com</div>
            </div>
          </section>

          <section class="profile-card" aria-label="Form đăng ký">
            <h2>Đăng ký tài khoản</h2>
            <div th:object="${form}">
              <div th:if="${#fields.hasErrors('*')}" class="auth-hint">
                <div th:each="e : ${#fields.errors('*')}" th:text="${e}">Lỗi</div>
              </div>
              <form class="profile-form" method="post" th:action="@{/dang-ky}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="profile-field">
                  <label for="fullName">Họ và tên</label>
                  <input class="profile-input" id="fullName" th:field="*{fullName}" placeholder="Nhập họ tên" />
                </div>
                <div class="profile-field">
                  <label for="email">Email</label>
                  <input class="profile-input" id="email" th:field="*{email}" type="email" placeholder="Nhập email" />
                </div>
                <div class="profile-field">
                  <label for="phone">Số điện thoại</label>
                  <input class="profile-input" id="phone" th:field="*{phone}" placeholder="Nhập số điện thoại" />
                </div>
                <div class="profile-field">
                  <label for="password">Mật khẩu</label>
                  <input class="profile-input" id="password" th:field="*{password}" type="password" placeholder="Nhập mật khẩu" />
                </div>
                <div class="profile-field">
                  <label for="confirmPassword">Nhập lại mật khẩu</label>
                  <input
                    class="profile-input"
                    id="confirmPassword"
                    th:field="*{confirmPassword}"
                    type="password"
                    placeholder="Nhập lại mật khẩu"
                  />
                </div>
                <div class="auth-row" aria-label="Điều khoản">
                  <label for="terms">
                    <input id="terms" th:field="*{terms}" type="checkbox" />
                    <span>Đồng ý điều khoản</span>
                  </label>
                  <span></span>
                </div>
                <div class="profile-actions">
                  <button class="profile-btn" type="submit">TẠO TÀI KHOẢN</button>
                </div>
              </form>
            </div>
            <p class="auth-hint">
              Đã có tài khoản?
              <a th:href="@{/dang-nhap}"><strong>Đăng nhập</strong></a>
            </p>
          </section>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('home')}"></footer>
  </body>
</html>
