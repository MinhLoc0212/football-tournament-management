<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <body>
    <footer class="footer" th:fragment="footer(active)">
      <div class="container footer-grid">
        <div>
          <div class="footer-brand">SPORT TOURNAMENT</div>
          <div class="support">
            Nếu bạn cần hỗ trợ hoặc muốn góp ý cho nền tảng, hãy liên hệ với chúng tôi qua thông tin bên dưới.
          </div>
          <div class="contact" aria-label="Thông tin liên hệ">
            <img th:src="@{/assets/figma/icon-map-pin.svg}" alt="" />
            <div>TP. Thủ Đức, TP. HCM</div>
            <img th:src="@{/assets/figma/icon-phone.svg}" alt="" />
            <div>0123456789</div>
            <img th:src="@{/assets/figma/icon-mail.svg}" alt="" />
            <div>sporttournament@example.com</div>
          </div>
        </div>

        <div class="quick-links" aria-label="Liên kết nhanh">
          <h3>LIÊN KẾT NHANH</h3>
          <a th:href="@{/}" th:attr="aria-current=${active == 'home'} ? 'page' : null">TRANG CHỦ</a>
          <a th:href="@{/tin-tuc}" th:attr="aria-current=${active == 'news'} ? 'page' : null">TIN TỨC</a>
          <a th:href="@{/gioi-thieu}" th:attr="aria-current=${active == 'about'} ? 'page' : null">GIỚI THIỆU</a>
          <a th:href="@{/lien-he}" th:attr="aria-current=${active == 'contact'} ? 'page' : null">LIÊN HỆ</a>
          <a href="#">GIẢI ĐẤU</a>
        </div>
      </div>
      <div class="container copyright">©_SPORT TOURNAMENT. All Rights Reserved.</div>
    </footer>
  </body>
</html>
