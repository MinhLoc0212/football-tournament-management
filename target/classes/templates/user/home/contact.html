<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPORT TOURNAMENT - Liên hệ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('contact')}"></header>

    <main>
      <section class="banner">
        <div class="container">
          <h1>LIÊN HỆ</h1>
          <p class="crumb">Home / CONTACT</p>
        </div>
      </section>

      <section class="home-section">
        <div class="container">
          <div class="home-section__head">
            <h2 class="home-section__title">Liên hệ</h2>
            <p class="home-section__desc">Nếu bạn cần hỗ trợ, hãy gửi thông tin và chúng tôi sẽ phản hồi sớm nhất.</p>
          </div>

          <div class="contact-page__grid">
            <section class="contact-card" aria-label="Thông tin liên hệ">
              <div class="contact-card__title">Thông tin liên hệ</div>
              <div class="contact-info" aria-label="Thông tin liên hệ">
                <a class="contact-info__row" href="https://www.google.com/maps/search/?api=1&query=TP.%20Th%E1%BB%A7%20%C4%90%E1%BB%A9c%2C%20TP.%20HCM" target="_blank" rel="noopener">
                  <span class="contact-info__icon"><img th:src="@{/assets/figma/icon-map-pin.svg}" alt="" /></span>
                  <span>TP. Thủ Đức, TP. HCM</span>
                </a>
                <a class="contact-info__row" href="tel:0123456789">
                  <span class="contact-info__icon"><img th:src="@{/assets/figma/icon-phone.svg}" alt="" /></span>
                  <span>0123 456 789</span>
                </a>
                <a class="contact-info__row" href="mailto:sporttournament@example.com">
                  <span class="contact-info__icon"><img th:src="@{/assets/figma/icon-mail.svg}" alt="" /></span>
                  <span>sporttournament@example.com</span>
                </a>
              </div>
              <div class="contact-map" id="contactMap" aria-label="Bản đồ">Đang tải bản đồ...</div>
            </section>

            <section class="contact-card" aria-label="Gửi tin nhắn">
              <div class="contact-card__title">Gửi tin nhắn</div>
              <form class="contact-form">
                <div>
                  <label for="name">Họ tên</label>
                  <input id="name" name="name" placeholder="Nhập họ tên" />
                </div>
                <div>
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" placeholder="Nhập email" />
                </div>
                <div>
                  <label for="message">Nội dung</label>
                  <textarea id="message" name="message" placeholder="Nhập nội dung"></textarea>
                </div>
                <div class="contact-actions">
                  <button class="home-btn home-btn--primary" type="button">Gửi</button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('contact')}"></footer>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (async () => {
        const mapEl = document.getElementById("contactMap");
        if (!mapEl) return;

        try {
          const q = "TP. Thủ Đức, TP. Hồ Chí Minh, Việt Nam";
          const res = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
          if (!res.ok) {
            throw new Error("Geocode failed");
          }

          const data = await res.json();
          if (!data || typeof data.lat !== "number" || typeof data.lon !== "number") {
            throw new Error("Invalid response");
          }

          mapEl.classList.add("is-loaded");
          mapEl.textContent = "";

          const map = L.map(mapEl).setView([data.lat, data.lon], 13);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          }).addTo(map);

          L.marker([data.lat, data.lon]).addTo(map).bindPopup(data.displayName || q).openPopup();
        } catch (e) {
          mapEl.textContent = "Không tải được bản đồ. Vui lòng thử lại sau.";
        }
      })();
    </script>
  </body>
</html>
