<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Tournament - Danh sách giải đấu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}">
    <link rel="stylesheet" th:href="@{/assets/css/user-pages.css}">
        <link rel="stylesheet" th:href="@{/assets/css/tournament-list.css}">

</head>
<body>

<th:block th:replace="~{user/fragments/header :: header('tournament')}"></th:block>

<main>
    <section class="hero">
        <div class="container">
            <h1 class="hero__title">GIẢI ĐẤU BÓNG ĐÁ</h1>
            <p class="hero__crumb">Home / FOOTBALL</p>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <h2 class="section__title">DANH SÁCH GIẢI ĐẤU</h2>
            <div class="tournament-grid">
                <article class="tournament-card" th:each="t : ${tournaments}">
                    <div class="tournament-card__cover" th:style="'background-image: url(' + (${t.imageUrl != null} ? ${t.imageUrl} : '/assets/general-overview/tournament.jpg') + '); background-size: cover; background-position: center;'"></div>
                    <div class="tournament-card__content">
                        <h3 class="tournament-card__title" th:text="${t.name}">HUTECH mở rộng lần 1</h3>
                        <p class="tournament-card__meta" th:text="'BTC: ' + ${t.organizer}">BTC: Đỗ Thành Nhân</p>
                        <p class="tournament-card__meta" th:text="'Hình thức: ' + (${t.mode == T(com.example.football_tourament_web.model.enums.TournamentMode).GROUP_STAGE} ? 'Chia bảng đấu (Group Stage)' : 'Knockout')">Hình thức: Knockout</p>
                        <p class="tournament-card__meta" th:text="'Số đội: ' + ${t.teamLimit}">Số đội: 4</p>
                        <div class="card-bottom">
                            <span class="status" th:classappend="'status--' + ${#strings.toLowerCase(t.status)}" th:text="${t.status == T(com.example.football_tourament_web.model.enums.TournamentStatus).UPCOMING ? 'Sắp diễn ra' : (t.status == T(com.example.football_tourament_web.model.enums.TournamentStatus).LIVE ? 'Đang đá' : 'Đã kết thúc')}">Đang đá</span>
                            <a th:href="@{/user/tournament/match-schedule(id=${t.id})}" class="detail-btn">Xem chi tiết <span>→</span></a>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<th:block th:replace="~{user/fragments/footer :: footer('tournament')}"></th:block>

</body>
</html>
