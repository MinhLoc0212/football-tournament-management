<script>
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab--active'));
            this.classList.add('tab--active');
        });
    });

    const matchDetailModal = document.getElementById('matchDetailModal');
    const openModalButtons = document.querySelectorAll('[data-open-match-modal]');
    const closeModalButtons = document.querySelectorAll('[data-close-match-modal]');
    const pitches = document.querySelectorAll('[data-pitch]');
    const slots = document.querySelectorAll('[data-slot]');
    const benches = document.querySelectorAll('[data-bench]');
    const playerTokens = document.querySelectorAll('.player-token');
    let dragState = null;

    const openMatchModal = () => {
        matchDetailModal.classList.add('is-open');
        matchDetailModal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
    };

    const closeMatchModal = () => {
        matchDetailModal.classList.remove('is-open');
        matchDetailModal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
    };

    openModalButtons.forEach(button => {
        button.addEventListener('click', openMatchModal);
    });

    closeModalButtons.forEach(button => {
        button.addEventListener('click', closeMatchModal);
    });

    const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

    const resetSlotHighlight = () => {
        slots.forEach(slot => slot.classList.remove('is-target'));
    };

    const resetBenchHighlight = () => {
        benches.forEach(bench => bench.classList.remove('is-target'));
    };

    const setTokenToBench = (token, bench, nextSibling) => {
        bench.insertBefore(token, nextSibling || null);
        token.dataset.slotId = '';
        token.style.position = '';
        token.style.left = '';
        token.style.top = '';
        token.style.transform = '';
        token.style.width = '';
        token.style.height = '';
        token.style.zIndex = '';
    };

    const getBenchBySlot = slot => {
        return slot.closest('.team-column')?.querySelector('[data-bench]') || null;
    };

    const clearSlotOccupancy = slotId => {
        if (!slotId) {
            return;
        }
        const slot = document.querySelector('[data-slot-id="' + slotId + '"]');
        if (slot) {
            slot.dataset.occupiedBy = '';
            slot.classList.remove('is-filled');
        }
    };

    const setTokenToSlot = (token, slot) => {
        const occupiedBy = slot.dataset.occupiedBy;
        if (occupiedBy && occupiedBy !== token.dataset.tokenId) {
            const existingToken = document.querySelector('[data-token-id="' + occupiedBy + '"]');
            const targetBench = getBenchBySlot(slot);
            if (existingToken && targetBench) {
                clearSlotOccupancy(existingToken.dataset.slotId);
                setTokenToBench(existingToken, targetBench, null);
            } else {
                return false;
            }
        }
        clearSlotOccupancy(token.dataset.slotId);
        const pitch = slot.closest('[data-pitch]');
        const rect = pitch.getBoundingClientRect();
        const slotRect = slot.getBoundingClientRect();
        const leftPercent = clamp((((slotRect.left + slotRect.width / 2) - rect.left) / rect.width) * 100, 8, 92);
        const topPercent = clamp((((slotRect.top + slotRect.height / 2) - rect.top) / rect.height) * 100, 8, 92);
        pitch.appendChild(token);
        slot.dataset.occupiedBy = token.dataset.tokenId;
        slot.classList.add('is-filled');
        token.dataset.slotId = slot.dataset.slotId;
        token.style.position = 'absolute';
        token.style.left = leftPercent + '%';
        token.style.top = topPercent + '%';
        token.style.transform = 'translate(-50%, -50%)';
        token.style.width = '';
        token.style.height = '';
        token.style.zIndex = '';
        return true;
    };

    const findNearestAvailableSlot = (clientX, clientY, token) => {
        const threshold = 70;
        let winner = null;
        let minDistance = Number.POSITIVE_INFINITY;
        slots.forEach(slot => {
            const occupiedBy = slot.dataset.occupiedBy;
            if (occupiedBy && occupiedBy !== token.dataset.tokenId) {
                return;
            }
            const rect = slot.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dist = Math.hypot(clientX - cx, clientY - cy);
            if (dist < threshold && dist < minDistance) {
                minDistance = dist;
                winner = slot;
            }
        });
        return winner;
    };

    const findBenchTarget = (clientX, clientY) => {
        return document.elementFromPoint(clientX, clientY)?.closest('[data-bench]') || null;
    };

    const onDragMove = event => {
        if (!dragState) {
            return;
        }
        dragState.token.style.left = event.clientX - dragState.offsetX + 'px';
        dragState.token.style.top = event.clientY - dragState.offsetY + 'px';
        resetSlotHighlight();
        resetBenchHighlight();
        const targetSlot = findNearestAvailableSlot(event.clientX, event.clientY, dragState.token);
        if (targetSlot) {
            targetSlot.classList.add('is-target');
            dragState.hoverSlot = targetSlot;
            dragState.hoverBench = null;
        } else {
            dragState.hoverSlot = null;
            const targetBench = findBenchTarget(event.clientX, event.clientY);
            if (targetBench) {
                targetBench.classList.add('is-target');
                dragState.hoverBench = targetBench;
            } else {
                dragState.hoverBench = null;
            }
        }
    };

    const onDragEnd = event => {
        if (!dragState) {
            return;
        }
        const targetSlot = dragState.hoverSlot || findNearestAvailableSlot(event.clientX, event.clientY, dragState.token);
        const targetBench = dragState.hoverBench || findBenchTarget(event.clientX, event.clientY);
        if (targetSlot) {
            if (!setTokenToSlot(dragState.token, targetSlot)) {
                if (dragState.fromSlotId) {
                    const originalSlot = document.querySelector('[data-slot-id="' + dragState.fromSlotId + '"]');
                    if (originalSlot) {
                        setTokenToSlot(dragState.token, originalSlot);
                    }
                } else {
                    setTokenToBench(dragState.token, dragState.startParent, dragState.startNextSibling);
                }
            }
        } else if (targetBench) {
            setTokenToBench(dragState.token, targetBench, null);
        } else if (dragState.fromSlotId) {
            const originalSlot = document.querySelector('[data-slot-id="' + dragState.fromSlotId + '"]');
            if (originalSlot) {
                setTokenToSlot(dragState.token, originalSlot);
            } else {
                setTokenToBench(dragState.token, dragState.startParent, dragState.startNextSibling);
            }
        } else if (dragState.fromPitch) {
            dragState.fromPitch.appendChild(dragState.token);
            dragState.token.style.position = 'absolute';
            dragState.token.style.left = dragState.startLeft;
            dragState.token.style.top = dragState.startTop;
            dragState.token.style.transform = 'translate(-50%, -50%)';
            dragState.token.style.width = '';
            dragState.token.style.height = '';
            dragState.token.style.zIndex = '';
        } else {
            setTokenToBench(dragState.token, dragState.startParent, dragState.startNextSibling);
        }
        dragState.token.classList.remove('is-dragging');
        resetSlotHighlight();
        resetBenchHighlight();
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragEnd);
        if (dragState) {
            dragState.token.style.pointerEvents = '';
        }
        dragState = null;
    };

    slots.forEach((slot, index) => {
        slot.dataset.slotId = 'slot-' + (index + 1);
        slot.dataset.occupiedBy = '';
        slot.classList.remove('is-filled');
    });

    playerTokens.forEach((token, index) => {
        token.dataset.tokenId = 'token-' + (index + 1);
    });

    playerTokens.forEach(token => {
        token.addEventListener('pointerdown', event => {
            event.preventDefault();
            const rect = token.getBoundingClientRect();
            dragState = {
                token,
                startParent: token.parentElement,
                startNextSibling: token.nextElementSibling,
                fromPitch: token.closest('[data-pitch]'),
                fromSlotId: token.dataset.slotId || '',
                hoverSlot: null,
                hoverBench: null,
                startLeft: token.style.left,
                startTop: token.style.top,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            clearSlotOccupancy(dragState.fromSlotId);
            token.classList.add('is-dragging');
            token.style.width = rect.width + 'px';
            token.style.height = rect.height + 'px';
            token.style.position = 'fixed';
            token.style.left = rect.left + 'px';
            token.style.top = rect.top + 'px';
            token.style.transform = '';
            token.style.zIndex = '1300';
        token.style.pointerEvents = 'none';
            document.body.appendChild(token);
            document.addEventListener('pointermove', onDragMove);
            document.addEventListener('pointerup', onDragEnd);
        });
    });

    window.addEventListener('keydown', event => {
        if (event.key === 'Escape' && matchDetailModal.classList.contains('is-open')) {
            closeMatchModal();
        }
    });
</script>
