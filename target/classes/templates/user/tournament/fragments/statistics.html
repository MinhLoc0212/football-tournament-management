<div th:fragment="statistics">
    <link rel="stylesheet" th:href="@{/assets/css/tournament-fragment-statistics.css}">
    <style>
        .stats-grid{grid-template-columns:repeat(3,1fr)}
        @media (max-width: 992px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
        @media (max-width: 640px){.stats-grid{grid-template-columns:1fr}}
        .stats-podium{display:grid;gap:12px;margin-bottom:16px}
        .stats-podium__top1{width:100%}
        .stats-podium__others{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        @media (max-width: 640px){.stats-podium__others{grid-template-columns:1fr}}
        .stats-podium__card{border:1px solid rgba(0,0,0,0.08);border-radius:14px;padding:12px;min-height:104px;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .stats-podium__left{display:flex;align-items:center;gap:10px;min-width:0}
        .stats-podium__avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:#eee;flex:0 0 auto}
        .stats-podium__avatar img{width:100%;height:100%;object-fit:cover;display:block}
        .stats-podium__name{font-weight:900;font-size:14px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .stats-podium__team{font-size:12px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .stats-podium__right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:0 0 auto}
        .stats-podium__rank{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:999px;font-weight:900}
        .stats-podium__value{display:inline-flex;align-items:center;justify-content:center;min-width:44px;padding:2px 10px;border-radius:999px;background:#111827;color:#fff;font-weight:900}
        .stats-list{gap:10px}
        .stats-item{padding:12px 12px;border-radius:12px}
        .stats-player-avatar img{width:100%;height:100%;object-fit:cover;display:block}
        .stats-player-rank{width:24px}
        .stats-value{min-width:44px;text-align:right}
    </style>

    <div class="stats-section">
        <div class="stats-grid">
            <div class="stats-card">
                <h3 class="stats-card-title"><span>⚽</span> Vua phá lưới</h3>

                <div th:if="${#lists.isEmpty(stats.scorers)}" class="text-center py-3">Chưa có dữ liệu</div>

                <div th:if="${!#lists.isEmpty(stats.scorers)}" class="stats-podium">
                    <div class="stats-podium__top1">
                        <div th:each="p, iter : ${stats.scorers}" th:if="${iter.index == 0}" class="stats-podium__card" style="background: rgba(255,170,23,0.10);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background:#facc15;color:#111;" th:text="${1}">1</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="stats-podium__others">
                        <div th:each="p, iter : ${stats.scorers}" th:if="${iter.index == 1}" class="stats-podium__card" style="background: rgba(17,24,39,0.04);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(17,24,39,0.12); color:#111;" th:text="${2}">2</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                        <div th:each="p, iter : ${stats.scorers}" th:if="${iter.index == 2}" class="stats-podium__card" style="background: rgba(239,68,68,0.08);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(239,68,68,0.12); color:#991b1b;" th:text="${3}">3</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-list" th:if="${!#lists.isEmpty(stats.scorers)}">
                    <div th:each="p, iter : ${stats.scorers}" th:if="${iter.index >= 3}" class="stats-item">
                        <div class="stats-player-info">
                            <span class="stats-player-rank" th:text="${iter.count}">4</span>
                            <div class="stats-player-avatar">
                                <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                            </div>
                            <div>
                                <div class="stats-player-name" th:text="${p.name}">Player</div>
                                <div class="stats-player-team" th:text="${p.teamName}">Team</div>
                            </div>
                        </div>
                        <div class="stats-value" th:text="${p.value}">0</div>
                    </div>
                </div>
            </div>

            <div class="stats-card">
                <h3 class="stats-card-title"><span>🟨</span> Thẻ vàng</h3>

                <div th:if="${#lists.isEmpty(stats.yellowCards)}" class="text-center py-3">Chưa có dữ liệu</div>

                <div th:if="${!#lists.isEmpty(stats.yellowCards)}" class="stats-podium">
                    <div class="stats-podium__top1">
                        <div th:each="p, iter : ${stats.yellowCards}" th:if="${iter.index == 0}" class="stats-podium__card" style="background: rgba(250,204,21,0.12);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(250,204,21,0.26); color:#111;" th:text="${1}">1</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="stats-podium__others">
                        <div th:each="p, iter : ${stats.yellowCards}" th:if="${iter.index == 1}" class="stats-podium__card" style="background: rgba(250,204,21,0.10);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(17,24,39,0.12); color:#111;" th:text="${2}">2</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                        <div th:each="p, iter : ${stats.yellowCards}" th:if="${iter.index == 2}" class="stats-podium__card" style="background: rgba(250,204,21,0.10);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(239,68,68,0.12); color:#991b1b;" th:text="${3}">3</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-list" th:if="${!#lists.isEmpty(stats.yellowCards)}">
                    <div th:each="p, iter : ${stats.yellowCards}" th:if="${iter.index >= 3}" class="stats-item">
                        <div class="stats-player-info">
                            <span class="stats-player-rank" th:text="${iter.count}">4</span>
                            <div class="stats-player-avatar">
                                <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                            </div>
                            <div>
                                <div class="stats-player-name" th:text="${p.name}">Player</div>
                                <div class="stats-player-team" th:text="${p.teamName}">Team</div>
                            </div>
                        </div>
                        <div class="stats-value" th:text="${p.value}">0</div>
                    </div>
                </div>
            </div>

            <div class="stats-card">
                <h3 class="stats-card-title"><span>🟥</span> Thẻ đỏ</h3>

                <div th:if="${#lists.isEmpty(stats.redCards)}" class="text-center py-3">Chưa có dữ liệu</div>

                <div th:if="${!#lists.isEmpty(stats.redCards)}" class="stats-podium">
                    <div class="stats-podium__top1">
                        <div th:each="p, iter : ${stats.redCards}" th:if="${iter.index == 0}" class="stats-podium__card" style="background: rgba(239,68,68,0.10);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(239,68,68,0.16); color:#991b1b;" th:text="${1}">1</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="stats-podium__others">
                        <div th:each="p, iter : ${stats.redCards}" th:if="${iter.index == 1}" class="stats-podium__card" style="background: rgba(239,68,68,0.08);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(17,24,39,0.12); color:#111;" th:text="${2}">2</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                        <div th:each="p, iter : ${stats.redCards}" th:if="${iter.index == 2}" class="stats-podium__card" style="background: rgba(239,68,68,0.08);">
                            <div class="stats-podium__left">
                                <div class="stats-podium__avatar">
                                    <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                    <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                                </div>
                                <div style="min-width:0;">
                                    <div class="stats-podium__name" th:text="${p.name}">Player</div>
                                    <div class="stats-podium__team" th:text="${p.teamName}">Team</div>
                                </div>
                            </div>
                            <div class="stats-podium__right">
                                <span class="stats-podium__rank" style="background: rgba(239,68,68,0.12); color:#991b1b;" th:text="${3}">3</span>
                                <span class="stats-podium__value" th:text="${p.value}">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stats-list" th:if="${!#lists.isEmpty(stats.redCards)}">
                    <div th:each="p, iter : ${stats.redCards}" th:if="${iter.index >= 3}" class="stats-item">
                        <div class="stats-player-info">
                            <span class="stats-player-rank" th:text="${iter.count}">4</span>
                            <div class="stats-player-avatar">
                                <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                            </div>
                            <div>
                                <div class="stats-player-name" th:text="${p.name}">Player</div>
                                <div class="stats-player-team" th:text="${p.teamName}">Team</div>
                            </div>
                        </div>
                        <div class="stats-value" th:text="${p.value}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
