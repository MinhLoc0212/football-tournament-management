<div th:fragment="bracket">
    <link rel="stylesheet" th:href="@{/assets/css/tournament-fragment-bracket.css}">

    <div class="bracket-section">
        <div class="bracket-container">
            <!-- Quarter Finals -->
            <div class="bracket-column round-quarter">
                <div class="bracket-round-title">Tứ kết</div>
                
                <div class="bracket-match">
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-manu">M</div>
                            <span class="bracket-team-name">Man United</span>
                        </div>
                        <span class="bracket-score">3</span>
                    </div>
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-chelsea">C</div>
                            <span class="bracket-team-name">Chelsea FC</span>
                        </div>
                        <span class="bracket-score">1</span>
                    </div>
                </div>

                <div class="bracket-match">
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-bayern">B</div>
                            <span class="bracket-team-name">Bayern Munich</span>
                        </div>
                        <span class="bracket-score">0</span>
                    </div>
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-liverpool">L</div>
                            <span class="bracket-team-name">Liverpool FC</span>
                        </div>
                        <span class="bracket-score">2</span>
                    </div>
                </div>

                <div class="bracket-match">
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-dortmund">D</div>
                            <span class="bracket-team-name">Dortmund</span>
                        </div>
                        <span class="bracket-score">2</span>
                    </div>
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-psg">P</div>
                            <span class="bracket-team-name">PSG</span>
                        </div>
                        <span class="bracket-score">1</span>
                    </div>
                </div>

                <div class="bracket-match">
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-arsenal">A</div>
                            <span class="bracket-team-name">Arsenal</span>
                        </div>
                        <span class="bracket-score">1</span>
                    </div>
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-juventus">J</div>
                            <span class="bracket-team-name">Juventus</span>
                        </div>
                        <span class="bracket-score">2</span>
                    </div>
                </div>
            </div>

            <!-- Semi Finals -->
            <div class="bracket-column round-semi">
                <div class="bracket-round-title">Bán kết</div>

                <div class="bracket-match">
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-manu">M</div>
                            <span class="bracket-team-name">Man United</span>
                        </div>
                        <span class="bracket-score">2</span>
                    </div>
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-liverpool">L</div>
                            <span class="bracket-team-name">Liverpool FC</span>
                        </div>
                        <span class="bracket-score">1</span>
                    </div>
                </div>

                <div class="bracket-match">
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-dortmund">D</div>
                            <span class="bracket-team-name">Dortmund</span>
                        </div>
                        <span class="bracket-score">3</span>
                    </div>
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-juventus">J</div>
                            <span class="bracket-team-name">Juventus</span>
                        </div>
                        <span class="bracket-score">2</span>
                    </div>
                </div>
            </div>

            <!-- Final -->
            <div class="bracket-column round-final">
                <div class="bracket-round-title">Chung kết</div>

                <div class="trophy-final">🏆</div>
                <div class="bracket-match">
                    <span class="final-badge">GRAND FINAL</span>
                    <div class="bracket-team bracket-winner">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-manu">M</div>
                            <span class="bracket-team-name">Man United</span>
                        </div>
                        <span class="bracket-score">1</span>
                    </div>
                    <div class="bracket-team">
                        <div class="bracket-team-info">
                            <div class="bracket-team-logo logo-dortmund">D</div>
                            <span class="bracket-team-name">Dortmund</span>
                        </div>
                        <span class="bracket-score">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
