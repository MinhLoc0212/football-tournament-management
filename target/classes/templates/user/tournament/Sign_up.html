<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký giải đấu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/tournament-sign-up.css}">
</head>
<body>

<div class="modal-overlay" id="registrationModal">
    <div class="modal-container">
        <header class="modal-header">
            <h2 class="form-title">FORM ĐĂNG KÝ</h2>
            <div class="tournament-badge">
                <p class="tournament-name" th:text="${'Giải: ' + (tournament?.name ?: 'HUTECH Mở Rộng')}">Giải: HUTECH mở rộng lần 32</p>
                <p class="slot-info">
                    Số đội: <strong th:text="${(registeredTeamCount ?: 0) + '/' + (tournament?.teamLimit ?: 0)}">2/8</strong>
                </p>
            </div>
            <div th:if="${tournamentIsFull}" class="alert alert-danger">Giải đấu đã đủ đội, không thể đăng ký thêm.</div>
            <div th:if="${registrationMessage}" th:text="${registrationMessage}"
                 th:classappend="${registrationSuccess ? 'alert-success' : 'alert-danger'}" class="alert"></div>
        </header>

        <form class="modal-content" th:action="@{/user/tournament/sign-up}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="tournamentId" th:value="${tournament?.id}">

            <div class="form-grid">
                <section class="column-section">
                    <div class="section-header">
                        <h3>1. Thông tin đội bóng</h3>
                        <button type="button" class="btn-util" id="useExistingTeamBtn">Sử dụng đội đã có</button>
                    </div>

                    <div id="existingTeamSelectorRow" class="form-group" style="display:none; margin-bottom: 15px;">
                        <select id="teamIdInput" name="teamId" class="form-control">
                            <option value="">-- Chọn đội của bạn --</option>
                            <option th:each="prefill : ${signUpTeamPrefills}"
                                    th:value="${prefill.teamId}"
                                    th:text="${prefill.teamName}"
                                    th:attr="data-team-name=${prefill.teamName},data-representative=${prefill.representativeName},data-email=${prefill.contactEmail},data-phone=${prefill.contactPhone},data-logo=${prefill.logoUrl}">
                            </option>
                        </select>
                    </div>

                    <div class="input-grid">
                        <input type="text" id="teamNameInput" name="teamName" placeholder="Tên đội bóng" required>
                        <input type="text" id="representativeInput" name="representative" placeholder="Người đại diện">
                        <input type="email" id="contactEmailInput" name="email" placeholder="Email liên hệ">
                        <input type="tel" id="contactPhoneInput" name="phone" placeholder="Số điện thoại">
                    </div>

                    <textarea id="teamDescriptionInput" name="description" placeholder="Giới thiệu sơ lược về đội bóng" rows="3"></textarea>

                    <div class="logo-upload-wrapper">
                        <div class="logo-preview" id="teamLogoPlaceholder">
                            <span>LOGO</span>
                        </div>
                        <div class="upload-action">
                            <label for="teamLogoInput" class="btn-outline">Tải logo lên</label>
                            <input type="file" id="teamLogoInput" name="logoFile" hidden accept="image/*">
                            <small id="fileNameDisplay">Chưa chọn ảnh</small>
                        </div>
                    </div>
                </section>

                <section class="column-section">
                    <div class="section-header">
                        <h3>2. Danh sách thành viên</h3>
                        <span class="player-count" id="playerCountLabel">0/10</span>
                    </div>

                    <div id="playerList" class="player-list-container">
                        <div class="empty-state">Chưa có thành viên nào được thêm.</div>
                    </div>

                    <div class="add-player-card" id="addPlayerBox">
                        <div class="mini-input-row">
                            <input type="text" id="newName" placeholder="Tên cầu thủ">
                            <input type="number" id="newNumber" placeholder="Số áo" min="1" max="99">
                        </div>
                        <div class="mini-action-row">
                            <label for="newImg" class="btn-avatar-label">Ảnh chân dung</label>
                            <input type="file" id="newImg" hidden accept="image/*">
                            <button type="button" class="btn-add-player" onclick="addPlayer()">THÊM</button>
                        </div>
                    </div>
                </section>
            </div>

            <footer class="modal-footer">
                <button type="submit" class="btn-submit" th:disabled="${tournamentIsFull}">GỬI HỒ SƠ ĐĂNG KÝ</button>
            </footer>
        </form>
    </div>
</div>

<div id="teamPrefillPlayersData" style="display:none;">
    <div th:each="prefill : ${signUpTeamPrefills}" th:attr="data-team-id=${prefill.teamId}">
        <span th:each="player : ${prefill.players}" class="player-data"
              th:attr="data-name=${player.fullName},data-number=${player.jerseyNumber},data-avatar=${player.avatarUrl}"></span>
    </div>
</div>
<script th:inline="javascript">
    const teamLogoInput = document.getElementById('teamLogoInput');
    const teamLogoPlaceholder = document.getElementById('teamLogoPlaceholder');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const playerList = document.getElementById('playerList');
    const playerCountLabel = document.getElementById('playerCountLabel');
    const teamNameInput = document.getElementById('teamNameInput');
    const representativeInput = document.getElementById('representativeInput');
    const contactEmailInput = document.getElementById('contactEmailInput');
    const contactPhoneInput = document.getElementById('contactPhoneInput');
    const teamDescriptionInput = document.getElementById('teamDescriptionInput');
    const addPlayerBox = document.getElementById('addPlayerBox');
    const MAX_PLAYERS = 10;
    let usingExistingTeam = false;

    // 1. Xử lý xem trước Logo khi chọn file
    teamLogoInput.addEventListener('change', function(e) {
        if (usingExistingTeam) {
            e.target.value = '';
            return;
        }
        const file = e.target.files[0];
        if (file) {
            fileNameDisplay.textContent = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                teamLogoPlaceholder.innerHTML = `<img src="${event.target.result}" alt="Logo preview">`;
            }
            reader.readAsDataURL(file);
        }
    });

    function createPlayerItem(name, number, avatarUrl, removable) {
        const playerItem = document.createElement('div');
        playerItem.className = 'player-item';
        const imageSrc = avatarUrl || '/assets/figma/avatar.jpg';
        const jerseyText = number == null || number === '' ? '—' : String(number).trim();
        playerItem.dataset.jerseyNumber = jerseyText;
        playerItem.innerHTML = `
            <img src="${imageSrc}" class="player-avatar" onerror="this.src='/assets/figma/avatar.jpg'">
            <div class="player-info">
                <b>${name || 'Chưa có tên'}</b><br>
                <small>Số áo: ${jerseyText}</small>
            </div>
            ${removable ? '<button type="button" class="remove-btn" onclick="removePlayer(this)">Xóa</button>' : ''}
        `;
        return playerItem;
    }

    function isJerseyNumberUsed(number) {
        const jersey = String(number).trim();
        return Array.from(playerList.querySelectorAll('.player-item'))
            .some(item => (item.dataset.jerseyNumber || '').trim() === jersey);
    }

    function setExistingTeamMode(enabled) {
        usingExistingTeam = enabled;
        [teamNameInput, representativeInput, contactEmailInput, contactPhoneInput, teamDescriptionInput].forEach(el => {
            el.readOnly = enabled;
            el.classList.toggle('locked-field', enabled);
        });
        teamLogoInput.disabled = enabled;
        updatePlayerCount();
    }

    function addPlayer() {
        const name = document.getElementById('newName').value.trim();
        const number = document.getElementById('newNumber').value.trim();
        const jerseyNumber = Number(number);
        const imageFile = document.getElementById('newImg').files[0];
        const playerCount = playerList.querySelectorAll('.player-item').length;

        if (playerCount >= MAX_PLAYERS) {
            alert("Đã đạt giới hạn 10 cầu thủ!");
            return;
        }
        if (!name || !number) {
            alert("Vui lòng nhập tên và số áo!");
            return;
        }
        if (!Number.isInteger(jerseyNumber) || jerseyNumber < 1 || jerseyNumber > 99) {
            alert("Số áo phải là số nguyên từ 1 đến 99!");
            return;
        }
        if (isJerseyNumberUsed(jerseyNumber)) {
            alert("Số áo này đã được sử dụng, vui lòng chọn số khác!");
            return;
        }

        const emptyState = playerList.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        if (!imageFile) {
            playerList.appendChild(createPlayerItem(name, jerseyNumber, null, true));
            updatePlayerCount();
            document.getElementById('newName').value = '';
            document.getElementById('newNumber').value = '';
            document.getElementById('newImg').value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
            playerList.appendChild(createPlayerItem(name, jerseyNumber, event.target.result, true));
            updatePlayerCount();
            document.getElementById('newName').value = '';
            document.getElementById('newNumber').value = '';
            document.getElementById('newImg').value = '';
        };
        reader.readAsDataURL(imageFile);
    }

    function removePlayer(btn) {
        btn.closest('.player-item').remove();
        if (playerList.querySelectorAll('.player-item').length === 0) {
            playerList.innerHTML = '<div class="empty-state">Chưa có thành viên nào được thêm.</div>';
        }
        updatePlayerCount();
    }

    function updatePlayerCount() {
        const count = playerList.querySelectorAll('.player-item').length;
        playerCountLabel.textContent = `${count}/${MAX_PLAYERS}`;
        addPlayerBox.style.display = count >= MAX_PLAYERS ? 'none' : 'block';
    }

    const useBtn = document.getElementById('useExistingTeamBtn');
    const selectorRow = document.getElementById('existingTeamSelectorRow');
    const teamSelect = document.getElementById('teamIdInput');

    useBtn.addEventListener('click', () => {
        if (teamSelect.options.length <= 1) {
            alert('Bạn chưa có đội để sử dụng.');
            return;
        }
        selectorRow.style.display = 'block';
        teamSelect.selectedIndex = 1;
        teamSelect.dispatchEvent(new Event('change'));
        useBtn.textContent = 'Đang dùng đội đã có';
    });

    teamSelect.addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        if (!opt.value) return;

        setExistingTeamMode(true);
        teamNameInput.value = opt.dataset.teamName;
        representativeInput.value = opt.dataset.representative;
        contactEmailInput.value = opt.dataset.email;
        contactPhoneInput.value = opt.dataset.phone;
        teamDescriptionInput.value = 'Đội đã có sẵn trên hệ thống';

        if (opt.dataset.logo) {
            teamLogoPlaceholder.innerHTML = `<img src="${opt.dataset.logo}">`;
        }

        playerList.innerHTML = '';
        const teamId = opt.value;
        const playerDataRoot = document.querySelector(`[data-team-id="${teamId}"]`);

        if (playerDataRoot) {
            const players = playerDataRoot.querySelectorAll('.player-data');
            players.forEach(p => {
                playerList.appendChild(createPlayerItem(p.dataset.name, p.dataset.number, p.dataset.avatar, true));
            });
        }
        updatePlayerCount();
    });

    setExistingTeamMode(false);
    updatePlayerCount();
</script>
</body>
</html>
