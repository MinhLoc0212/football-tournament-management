<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Giải Đấu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}">
    <link rel="stylesheet" th:href="@{/assets/css/user-pages.css}">
        <link rel="stylesheet" th:href="@{/assets/css/tournament-sign-up.css}">

</head>
<body>

<th:block th:replace="~{user/fragments/header :: header('tournament')}"></th:block>

<section class="hero-banner">
    <div class="container hero-content">
        <div class="hero-text">
            <h1>GIẢI ĐẤU BÓNG ĐÁ</h1>
            <p>HOME / FOOTBALL</p>
        </div>
        <div class="hero-img"></div>
    </div>
</section>

<main class="container">
    <div class="registration-form">
        <h2 class="form-title">FORM ĐĂNG KÝ</h2>
        <div class="form-subtitle">Tham gia giải: Giải 1</div>
        <p class="form-info-title">THÔNG TIN ĐỘI BÓNG & THÀNH VIÊN</p>

        <div class="form-section">
            <div class="section-header">
                <h3>1. Thông tin đội bóng</h3>
                <button class="btn btn-use-existing">Sử dụng thông tin đội đã có</button>
            </div>
            <div class="grid-inputs">
                <input type="text" placeholder="Tên đội bóng">
                <input type="text" placeholder="Người đại diện">
                <input type="email" placeholder="Email liên hệ">
                <input type="tel" placeholder="Số điện thoại">
            </div>
            <textarea placeholder="Giới thiệu sơ lược về đội bóng"></textarea>

            <div class="logo-upload">
                <p class="logo-upload-title">Logo Đội Bóng:</p>
                <div class="logo-placeholder">CLUB NAME</div>
                <input type="file" class="logo-file-input">
            </div>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h3>2. Danh sách thành viên</h3>
            </div>

            <div id="playerList">
                <div class="player-item">
                    <img src="https://i.pravatar.cc/150?u=1" class="player-avatar">
                    <div class="player-info">
                        <div>Số áo: <strong>38</strong></div>
                        <div>Họ và tên: <strong>Nguyễn Văn A</strong></div>
                    </div>
                    <button class="remove-btn" onclick="this.parentElement.remove()">X</button>
                </div>
            </div>

            <div class="add-player-box">
                <div>
                    <label class="add-player-label">Tên cầu thủ</label>
                    <input type="text" id="newName" placeholder="Nhập tên thành viên">
                </div>
                <div>
                    <label class="add-player-label">Số áo</label>
                    <input type="number" id="newNumber" placeholder="Số áo">
                </div>
                <div>
                    <label class="add-player-label">Ảnh chân dung</label>
                    <input type="file" id="newImg">
                </div>
                <button class="btn btn-add-player" onclick="addPlayer()">Thêm</button>
            </div>
        </div>

        <button class="btn btn-submit">GỬI HỒ SƠ ĐĂNG KÝ</button>
    </div>
</main>

<th:block th:replace="~{user/fragments/footer :: footer('tournament')}"></th:block>

<script>
    function addPlayer() {
        const name = document.getElementById('newName').value;
        const number = document.getElementById('newNumber').value;

        if(!name || !number) {
            alert("Vui lòng nhập tên và số áo!");
            return;
        }

        const playerList = document.getElementById('playerList');
        const newItem = document.createElement('div');
        newItem.className = 'player-item';
        newItem.innerHTML = `
            <img src="https://i.pravatar.cc/150?u=${Math.random()}" class="player-avatar">
            <div class="player-info">
                <div>Số áo: <strong>${number}</strong></div>
                <div>Họ và tên: <strong>${name}</strong></div>
            </div>
            <button class="remove-btn" onclick="this.parentElement.remove()">X</button>
        `;

        playerList.appendChild(newItem);

        // Reset input
        document.getElementById('newName').value = '';
        document.getElementById('newNumber').value = '';
    }
</script>

</body>
</html>
