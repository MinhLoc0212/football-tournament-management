<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Các đội tham gia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}">
    <link rel="stylesheet" th:href="@{/assets/css/user-pages.css}">
        <link rel="stylesheet" th:href="@{/assets/css/tournament-competing-teams.css}">

</head>
<body>
<th:block th:replace="~{user/fragments/header :: header('tournament')}"></th:block>

<div class="hero">
    <div class="container">
        <h1 class="hero__title">CHI TIẾT GIẢI ĐẤU</h1>
        <p class="hero__sub">Thông tin chi tiết, lịch thi đấu và kết quả.</p>
    </div>
</div>

<main>
    <div class="container">
        <div class="back-link-bar">
            <a th:href="@{/user/tournament/match-schedule(id=${tournament != null ? tournament.id : null})}" class="back-link">
                <span class="back-link__icon">←</span>
                Quay lại lịch đấu
            </a>
            <a th:href="@{/user/tournament/sign-up(id=${tournament != null ? tournament.id : null})}" class="page-btn">Đăng kí giải đấu</a>
        </div>

        <div class="tournament-section">
            <div class="tournament-info">
                <div class="tournament-logo">
                    <img th:if="${tournament != null and tournament.imageUrl != null and !#strings.isEmpty(tournament.imageUrl)}"
                         th:src="${tournament.imageUrl}"
                         th:alt="${tournament.name != null ? tournament.name : 'Tournament'}"
                         class="tournament-logo__img">
                    <svg th:unless="${tournament != null and tournament.imageUrl != null and !#strings.isEmpty(tournament.imageUrl)}" class="club-logo-svg" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="55" cy="55" r="50" fill="#f0f0f0" stroke="#ccc" stroke-width="2"/>
                        <circle cx="55" cy="55" r="42" fill="none" stroke="#222" stroke-width="3"/>
                        <circle cx="55" cy="55" r="12" fill="#222"/>
                        <line x1="55" y1="13" x2="55" y2="97" stroke="#222" stroke-width="2.5"/>
                        <line x1="13" y1="55" x2="97" y2="55" stroke="#222" stroke-width="2.5"/>
                        <polygon points="55,22 68,42 55,55 42,42" fill="#222"/>
                        <polygon points="55,88 68,68 55,55 42,68" fill="#222"/>
                        <text x="55" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="Arial">CLUB</text>
                        <text x="55" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#fff" font-family="Arial">NAME</text>
                    </svg>
                </div>

                <div class="tournament-details">
                    <div class="tournament-name" th:text="${tournament != null and tournament.name != null and !#strings.isEmpty(tournament.name) ? tournament.name : 'Giải đấu'}">HUTECH mở rộng lần 31</div>
                    <div class="tournament-meta">
                        <span th:text="${'BTC: ' + (tournament != null and tournament.organizer != null and !#strings.isEmpty(tournament.organizer) ? tournament.organizer : 'Chưa cập nhật')}">BTC: Đỗ Thành Nhân</span>
                        <span th:text="${'Hình thức: ' + (tournament != null and tournament.mode != null ? tournament.mode.displayName : 'Chưa cập nhật')}">Hình thức: Knockout</span>
                        <span th:text="${'Số đội: ' + (tournament != null and tournament.teamLimit != null ? tournament.teamLimit : 0)}">Số đội: 8</span>
                        <span>Trạng thái: <span class="status-badge" th:text="${tournament != null and tournament.status != null ? tournament.status.displayName : 'Chưa xác định'}">Đang diễn ra</span></span>
                        <span th:text="${'Mô tả: ' + (tournament != null and tournament.description != null and !#strings.isEmpty(tournament.description) ? tournament.description : 'Đang cập nhật')}">Mô tả: Giải đấu phong trào dành cho các đội sinh viên.</span>
                    </div>
                </div>
            </div>

            <div class="tabs">
                <a class="tab" th:href="@{/user/tournament/match-schedule(id=${tournament != null ? tournament.id : null})}">Lịch đấu</a>
                <button type="button" class="tab">BXH</button>
                <button type="button" class="tab">Thống kê</button>
                <button type="button" class="tab">Biểu đồ</button>
                <button type="button" class="tab">Bracket</button>
                <a class="tab tab--active" th:href="@{/user/tournament/competing-teams(id=${tournament != null ? tournament.id : null})}">Các đội</a>
            </div>
        </div>

        <th:block th:replace="~{user/tournament/fragments/teams :: teams}"></th:block>
    </div>
</main>

<th:block th:replace="~{user/fragments/footer :: footer('tournament')}"></th:block>
</body>
</html>
