<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <body>
    <th:block th:fragment="header(active)">
      <header class="header">
        <div class="container header-inner">
          <div class="brand">SPORT TOURNAMENT</div>
          <nav class="nav" aria-label="Điều hướng chính">
            <a th:href="@{/}" th:attr="aria-current=${active == 'home'} ? 'page' : null">TRANG CHỦ</a>
            <a th:href="@{/user/tournament}" th:attr="aria-current=${active == 'tournament'} ? 'page' : null">GIẢI ĐẤU</a>
            <a th:href="@{/gioi-thieu}" th:attr="aria-current=${active == 'about'} ? 'page' : null">GIỚI THIỆU</a>
            <a th:href="@{/tin-tuc}" th:attr="aria-current=${active == 'news'} ? 'page' : null">TIN TỨC</a>
            <a th:href="@{/lien-he}" th:attr="aria-current=${active == 'contact'} ? 'page' : null">LIÊN HỆ</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/dang-nhap}" th:attr="aria-current=${active == 'login'} ? 'page' : null">ĐĂNG NHẬP</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">ADMIN</a>
            <div sec:authorize="isAuthenticated()" class="user-menu" data-user-menu>
              <button type="button" class="user-menu__trigger" aria-haspopup="menu" aria-expanded="false">
                <img
                  th:if="${currentUserAvatarUrl != null and !#strings.isEmpty(currentUserAvatarUrl)}"
                  class="user-avatar__img"
                  th:src="${currentUserAvatarUrl}"
                  alt="Avatar"
                />
                <img
                  th:unless="${currentUserAvatarUrl != null and !#strings.isEmpty(currentUserAvatarUrl)}"
                  class="user-avatar__img"
                  th:src="@{/assets/figma/avatar.jpg}"
                  alt="Avatar"
                />
              </button>
              <div class="user-menu__dropdown" role="menu">
                <div class="user-menu__meta">
                  <div
                    class="user-menu__name"
                    th:if="${currentUserFullName != null and !#strings.isEmpty(currentUserFullName)}"
                    th:text="${currentUserFullName}"
                  >
                    Tài khoản
                  </div>
                  <div class="user-menu__name" th:unless="${currentUserFullName != null and !#strings.isEmpty(currentUserFullName)}">
                    Tài khoản
                  </div>

                  <div
                    class="user-menu__email"
                    th:if="${currentUserEmail != null and !#strings.isEmpty(currentUserEmail)}"
                    th:text="${currentUserEmail}"
                  >
                    email
                  </div>
                  <div class="user-menu__email" th:unless="${currentUserEmail != null and !#strings.isEmpty(currentUserEmail)}" th:text="${#authentication.name}">
                    email
                  </div>
                </div>
                <a th:href="@{/ca-nhan}" role="menuitem">Trang cá nhân</a>
                <form th:action="@{/dang-xuat}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                  <button type="submit" class="user-menu__logout" role="menuitem">Đăng xuất</button>
                </form>
              </div>
            </div>
          </nav>
        </div>
      </header>
      <script>
        (() => {
          if (window.__userMenuInit) return;
          window.__userMenuInit = true;

          const closeAll = () => {
            document.querySelectorAll("[data-user-menu].is-open").forEach((m) => {
              m.classList.remove("is-open");
              const btn = m.querySelector(".user-menu__trigger");
              if (btn) btn.setAttribute("aria-expanded", "false");
            });
          };

          document.addEventListener("click", (e) => {
            const menu = e.target instanceof Element ? e.target.closest("[data-user-menu]") : null;
            if (!menu) {
              closeAll();
              return;
            }

            const trigger = e.target instanceof Element ? e.target.closest(".user-menu__trigger") : null;
            if (!trigger) return;

            const isOpen = menu.classList.contains("is-open");
            closeAll();
            if (!isOpen) {
              menu.classList.add("is-open");
              trigger.setAttribute("aria-expanded", "true");
            }
          });

          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeAll();
          });
        })();
      </script>
    </th:block>
  </body>
</html>
