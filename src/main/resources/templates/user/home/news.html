<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPORT TOURNAMENT - Tin tức</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('news')}"></header>

    <main>
      <section class="banner">
        <div class="container">
          <h1>TIN TỨC</h1>
          <p class="crumb">Home / NEWS</p>
        </div>
      </section>

      <section class="news">
        <div class="container">
          <div class="news-grid">
            <article class="card">
              <img src="/assets/figma/news-1.png" alt="Tin tức 1" />
              <div class="content">
                <h2 class="title">Tin tức 1</h2>
                <p class="desc">
                  Cập nhật các hoạt động thể thao và giải đấu mới nhất trên nền tảng.
                </p>
              </div>
            </article>

            <article class="card">
              <img src="/assets/figma/news-2.png" alt="Tin tức 2" />
              <div class="content">
                <h2 class="title">Tin tức 2</h2>
                <p class="desc">
                  Theo dõi lịch trình, sự kiện và những thông tin nổi bật liên quan đến thể thao.
                </p>
              </div>
            </article>

            <article class="card">
              <img src="/assets/figma/news-3.png" alt="Tin tức 3" />
              <div class="content">
                <h2 class="title">Tin tức 3</h2>
                <p class="desc">
                  Nội dung tổng hợp, bài viết và thông báo dành cho cộng đồng yêu thích thể thao.
                </p>
              </div>
            </article>
          </div>

          <nav class="pagination" aria-label="Phân trang">
            <a href="#" aria-current="page">1</a>
            <a href="#">2</a>
            <a href="#">3</a>
            <a href="#" aria-label="Trang tiếp theo">...</a>
          </nav>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('news')}"></footer>
  </body>
</html>
