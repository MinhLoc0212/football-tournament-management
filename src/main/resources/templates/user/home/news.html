<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPORT TOURNAMENT - Tin tức</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('news')}"></header>

    <main>
      <section class="banner">
        <div class="container">
          <h1>TIN TỨC</h1>
          <p class="crumb">Home / NEWS</p>
        </div>
      </section>

      <section class="home-section">
        <div class="container">
          <div class="home-section__head home-section__head--row">
            <div>
              <h2 class="home-section__title">Tin tức mới nhất</h2>
              <p class="home-section__desc">Nguồn: CBS Sports</p>
            </div>
          </div>

          <div class="home-empty" th:if="${!hasNews}">
            Không tải được tin tức từ CBS Sports. Vui lòng thử lại sau.
          </div>

          <div class="news-page__grid" th:if="${hasNews}">
            <a class="news-page__card" th:each="item : ${newsItems}" th:href="${item.link}" target="_blank" rel="noopener noreferrer">
              <div class="news-page__media" aria-hidden="true">
                <img th:if="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}" th:src="${item.imageUrl}" alt="" />
                <img th:unless="${item.imageUrl != null and !#strings.isEmpty(item.imageUrl)}" th:src="@{/assets/figma/news-1.png}" alt="" />
              </div>
              <div class="news-page__body">
                <div class="news-page__title" th:text="${item.title}">Tiêu đề tin tức</div>
                <div class="news-page__desc" th:text="${item.description}">Nội dung mô tả ngắn</div>
                <div class="news-page__more">Đọc tiếp</div>
              </div>
            </a>
          </div>

          <nav class="pagination" aria-label="Phân trang" th:if="${totalPages > 1}">
            <a
              th:if="${currentPage > 1}"
              th:href="@{/tin-tuc(page=${currentPage - 1})}"
              aria-label="Trang trước"
              >‹</a
            >

            <a th:if="${startPage > 1}" th:href="@{/tin-tuc(page=1)}">1</a>
            <a th:if="${startPage > 2}" aria-disabled="true">...</a>

            <a
              th:each="p : ${#numbers.sequence(startPage, endPage)}"
              th:href="@{/tin-tuc(page=${p})}"
              th:text="${p}"
              th:attr="aria-current=${p == currentPage} ? 'page' : null"
              >1</a
            >

            <a th:if="${endPage < totalPages - 1}" aria-disabled="true">...</a>
            <a th:if="${endPage < totalPages}" th:href="@{/tin-tuc(page=${totalPages})}" th:text="${totalPages}"
              >1</a
            >

            <a
              th:if="${currentPage < totalPages}"
              th:href="@{/tin-tuc(page=${currentPage + 1})}"
              aria-label="Trang tiếp"
              >›</a
            >
          </nav>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('news')}"></footer>
  </body>
</html>
