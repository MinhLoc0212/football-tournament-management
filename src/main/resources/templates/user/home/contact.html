<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPORT TOURNAMENT - Liên hệ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('contact')}"></header>

    <main>
      <section class="banner">
        <div class="container">
          <h1>LIÊN HỆ</h1>
          <p class="crumb">Home / CONTACT</p>
        </div>
      </section>

      <section class="contact-page">
        <div class="container">
          <div class="contact-grid">
            <div class="panel">
              <h2>Thông tin liên hệ</h2>
              <div class="info" aria-label="Thông tin liên hệ">
                <img src="/assets/figma/icon-map-pin.svg" alt="" />
                <div>TP. Thủ Đức, TP. HCM</div>
                <img src="/assets/figma/icon-phone.svg" alt="" />
                <div>0123456789</div>
                <img src="/assets/figma/icon-mail.svg" alt="" />
                <div>sporttournament@example.com</div>
              </div>
              <div class="map" id="contactMap" aria-label="Bản đồ">Đang tải bản đồ...</div>
            </div>

            <div class="panel">
              <h2>Gửi tin nhắn</h2>
              <form>
                <div>
                  <label for="name">Họ tên</label>
                  <input id="name" name="name" placeholder="Nhập họ tên" />
                </div>
                <div>
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" placeholder="Nhập email" />
                </div>
                <div>
                  <label for="message">Nội dung</label>
                  <textarea id="message" name="message" placeholder="Nhập nội dung"></textarea>
                </div>
                <div class="actions">
                  <button type="button">GỬI</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('contact')}"></footer>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (async () => {
        const mapEl = document.getElementById("contactMap");
        if (!mapEl) return;

        try {
          const q = "TP. Thủ Đức, TP. Hồ Chí Minh, Việt Nam";
          const res = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
          if (!res.ok) {
            throw new Error("Geocode failed");
          }

          const data = await res.json();
          if (!data || typeof data.lat !== "number" || typeof data.lon !== "number") {
            throw new Error("Invalid response");
          }

          mapEl.classList.add("is-loaded");
          mapEl.textContent = "";

          const map = L.map(mapEl).setView([data.lat, data.lon], 13);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          }).addTo(map);

          L.marker([data.lat, data.lon]).addTo(map).bindPopup(data.displayName || q).openPopup();
        } catch (e) {
          mapEl.textContent = "Không tải được bản đồ. Vui lòng thử lại sau.";
        }
      })();
    </script>
  </body>
</html>
