<div th:fragment="standing">
    <style>
        .standing-section {
            padding: 24px 0;
            background: #fff;
            border-radius: 12px;
            margin-top: 8px;
        }

        .standing-table-container {
            overflow-x: auto;
            border: 1px solid #eee;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .standing-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
        }

        .standing-table thead {
            background: #171717;
            color: #fff;
        }

        .standing-table th {
            padding: 16px;
            text-align: center;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 12px;
        }

        .standing-table th:nth-child(2) {
            text-align: left;
        }

        .standing-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
            vertical-align: middle;
        }

        .standing-table tr:last-child td {
            border-bottom: none;
        }

        .standing-table tr:hover {
            background-color: #fcfcfc;
        }

        .rank-cell {
            font-weight: 700;
            color: #171717;
            width: 50px;
        }

        .team-cell {
            text-align: left !important;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .team-logo-standing {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .team-logo-standing img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pts-cell {
            font-weight: 700;
            color: #e8b931;
            background: rgba(232, 185, 49, 0.05);
        }

        .form-cell {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .form-dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }

        .form-w { background: #2c9e49; }
        .form-d { background: #999; }
        .form-l { background: #dc3545; }

        .rank-top {
            border-left: 4px solid #e8b931;
        }
    </style>

    <div class="standing-section">
        <div class="standing-table-container">
            <table class="standing-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Đội bóng</th>
                        <th>Trận</th>
                        <th>T</th>
                        <th>H</th>
                        <th>B</th>
                        <th>BT</th>
                        <th>BB</th>
                        <th>HS</th>
                        <th>Điểm</th>
                        <th>Phong độ</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="rank-top">
                        <td class="rank-cell">1</td>
                        <td class="team-cell">
                            <div class="team-logo-standing">
                                <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="18" cy="18" r="18" fill="#da291c"/>
                                    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">M</text>
                                </svg>
                            </div>
                            <span>Manchester United</span>
                        </td>
                        <td>5</td>
                        <td>4</td>
                        <td>1</td>
                        <td>0</td>
                        <td>12</td>
                        <td>4</td>
                        <td>+8</td>
                        <td class="pts-cell">13</td>
                        <td>
                            <div class="form-cell">
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-w">W</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="rank-cell">2</td>
                        <td class="team-cell">
                            <div class="team-logo-standing">
                                <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="18" cy="18" r="18" fill="#6cabdd"/>
                                    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">C</text>
                                </svg>
                            </div>
                            <span>Chelsea FC</span>
                        </td>
                        <td>5</td>
                        <td>3</td>
                        <td>2</td>
                        <td>0</td>
                        <td>10</td>
                        <td>5</td>
                        <td>+5</td>
                        <td class="pts-cell">11</td>
                        <td>
                            <div class="form-cell">
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-w">W</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="rank-cell">3</td>
                        <td class="team-cell">
                            <div class="team-logo-standing">
                                <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="18" cy="18" r="18" fill="#dc052d"/>
                                    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">B</text>
                                </svg>
                            </div>
                            <span>Bayern Munich</span>
                        </td>
                        <td>5</td>
                        <td>2</td>
                        <td>1</td>
                        <td>2</td>
                        <td>8</td>
                        <td>7</td>
                        <td>+1</td>
                        <td class="pts-cell">7</td>
                        <td>
                            <div class="form-cell">
                                <span class="form-dot form-l">L</span>
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-l">L</span>
                                <span class="form-dot form-w">W</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="rank-cell">4</td>
                        <td class="team-cell">
                            <div class="team-logo-standing">
                                <svg viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="18" cy="18" r="18" fill="#c8102e"/>
                                    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white">L</text>
                                </svg>
                            </div>
                            <span>Liverpool FC</span>
                        </td>
                        <td>5</td>
                        <td>1</td>
                        <td>2</td>
                        <td>2</td>
                        <td>6</td>
                        <td>9</td>
                        <td>-3</td>
                        <td class="pts-cell">5</td>
                        <td>
                            <div class="form-cell">
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-l">L</span>
                                <span class="form-dot form-w">W</span>
                                <span class="form-dot form-d">D</span>
                                <span class="form-dot form-l">L</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
