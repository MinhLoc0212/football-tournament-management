<div th:fragment="statistics">
    <link rel="stylesheet" th:href="@{/assets/css/tournament-fragment-statistics.css}">

    <div class="stats-section">
        <div class="stats-grid">
            <!-- Top Scorers -->
            <div class="stats-card">
                <h3 class="stats-card-title">
                    <span>⚽</span> Vua phá lưới
                </h3>
                <div class="stats-list">
                    <div th:if="${#lists.isEmpty(stats.scorers)}" class="text-center py-3">Chưa có dữ liệu</div>
                    <div th:each="p, iter : ${stats.scorers}" class="stats-item">
                        <div class="stats-player-info">
                            <span class="stats-player-rank" th:text="${iter.count}">1</span>
                            <div class="stats-player-avatar">
                                <img th:if="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" th:src="${p.avatarUrl}">
                                <svg th:unless="${p.avatarUrl != null and !#strings.isEmpty(p.avatarUrl)}" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="18" r="18" fill="#eee"/><text x="18" y="23" text-anchor="middle" font-size="14" fill="#999">👤</text></svg>
                            </div>
                            <div>
                                <div class="stats-player-name" th:text="${p.name}">Cristiano Ronaldo</div>
                                <div class="stats-player-team" th:text="${p.teamName}">Manchester United</div>
                            </div>
                        </div>
                        <div class="stats-value" th:text="${p.value}">8</div>
                    </div>
                </div>
            </div>

        </div>


    </div>
</div>
