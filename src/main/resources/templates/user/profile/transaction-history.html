<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử giao dịch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/assets/css/user-home.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/user-pages.css}" />
  </head>
  <body>
    <header th:replace="~{user/fragments/header :: header('profile')}"></header>
    <main>
      <section class="profile-hero">
        <div class="container">
          <h1>HỒ SƠ CÁ NHÂN</h1>
          <p class="crumb">Home / PROFILE</p>
        </div>
      </section>

      <section class="profile-page">
        <div class="container profile-grid">
          <aside class="profile-card" aria-label="Điều hướng hồ sơ">
            <div class="profile-user">
              <div class="profile-avatar" aria-hidden="true">
                <img th:src="${avatarSrc}" alt="" />
              </div>
              <div>
                <p class="name" th:text="${user.fullName}">Quang</p>
                <p class="email" th:text="${user.email}">abcd@gmail.com</p>
              </div>
            </div>

            <div class="profile-balance" aria-label="Số dư">
              <div class="value" th:text="${balanceText}">Số dư: 0đ</div>
              <a class="profile-btn" th:href="@{/thanh-toan}">Nạp tiền</a>
            </div>

            <nav class="profile-menu" aria-label="Menu hồ sơ">
              <a th:href="@{/ca-nhan}">
                <img class="icon" th:src="@{/assets/figma/icon-mail.svg}" alt="" />
                <span>Thông Tin Cá Nhân</span>
              </a>
              <a th:href="@{/thong-tin-doi}">
                <img class="icon" th:src="@{/assets/figma/icon-map-pin.svg}" alt="" />
                <span>Thông Tin Đội</span>
              </a>
              <a th:href="@{/lich-su-dang-ky}">
                <img class="icon" th:src="@{/assets/figma/icon-phone.svg}" alt="" />
                <span>Lịch Sử Đăng Ký</span>
              </a>
              <a th:href="@{/lich-su-giao-dich}" aria-current="page">
                <img class="icon" th:src="@{/assets/figma/icon-phone.svg}" alt="" />
                <span>Lịch Sử Giao Dịch</span>
              </a>
            </nav>
          </aside>

          <section class="profile-card" aria-label="Lịch sử giao dịch">
            <h2>Lịch Sử Giao Dịch</h2>
            <div class="table-wrap team-tableWrap" role="region" aria-label="Bảng lịch sử giao dịch" tabindex="0">
              <table class="team-table">
                <thead>
                  <tr>
                    <th>Thời gian</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="t : ${transactions}">
                    <td th:text="${t.time}">--/--/----</td>
                    <td th:text="${t.amount}">0đ</td>
                    <td>
                      <span class="badge" th:classappend="${t.statusClass}" th:text="${t.statusLabel}">---</span>
                    </td>
                  </tr>
                  <tr th:if="${transactions == null or #lists.isEmpty(transactions)}">
                    <td colspan="3" class="team-table__empty">Chưa có dữ liệu.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>
    <footer th:replace="~{user/fragments/footer :: footer('home')}"></footer>
  </body>
</html>
