<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách đội</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --bg: #ffffff;
            --surface: #f3f6f9;
            --border: #d9d9d9;
            --text: #111827;
            --muted: #6b7280;
            --muted-2: #b3b3b3;
            --brand: #009cff;
            --radius-xl: 25px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            color: var(--text);
            background: var(--bg);
        }

        .app {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            padding: 24px 18px;
            border-right: 1px solid rgba(17, 24, 39, 0.06);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar__brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 14px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            margin: 0 6px 18px;
        }

        .sidebar__brandIcon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.18), rgba(0, 156, 255, 0.06));
            display: grid;
            place-items: center;
        }

        .nav__log__out {
            border: 1px solid #d7305a;
        }

        .text--danger {
            color: #d7305a;
        }

        .sidebar__brandIcon svg { width: 26px; height: 26px; }

        .sidebar__brandTitle {
            font-weight: 700;
            font-size: 18px;
            line-height: 1.2;
        }

        .sidebar__sectionTitle {
            margin: 22px 12px 10px;
            font-weight: 600;
            font-size: 16px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 6px;
        }

        .nav__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text);

        }

        .nav__item_child {
            background: rgba(190, 193, 193, 0.8);
        }

        .nav__item_child:hover {
            background: rgba(240, 243, 243, 0.8);
            border: 1px solid #000000
        }

        .nav__item:hover {
            background: rgba(243, 246, 249, 0.8);
        }

        .nav__item--active {
            background: var(--surface);
        }

        .nav__icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            flex: 0 0 auto;
            background: rgba(17, 24, 39, 0.06);
            display: grid;
            place-items: center;
        }

        .nav__icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .nav__iconImg--left {
            object-position: left center;
        }

        .nav__icon svg { width: 22px; height: 22px; }

        .nav__label {
            font-weight: 500;
            font-size: 16px;
        }

        .nav__item--large {
            padding: 10px 12px;
        }

        .nav__icon--large {
            width: 71px;
            height: 71px;
            border-radius: 20px;
            background: var(--surface);
        }

        .nav__label--large {
            font-weight: 600;
            font-size: 18px;
        }

        .nav__chevron {
            margin-left: auto;
            width: 18px;
            height: 18px;
            opacity: 0.55;
        }

        .sidebar__footer {
            margin-top: 110px;
            padding: 0 6px;
        }

        .content {
            flex: 1 1 auto;
            padding: 28px 32px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 26px;
        }

        .topbar__menuBtn {
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            display: grid;
            place-items: center;
            padding: 0;
            cursor: pointer;
        }

        .topbar__menuBtn img {
            width: 30px;
            height: 30px;
            display: block;
        }

        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            width: 320px;
            height: 62px;
            border-radius: 9999px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .search svg { width: 18px; height: 18px; color: var(--muted-2); }

        .search input {
            border: 0;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: var(--text);
        }

        .search input::placeholder { color: var(--muted-2); }

        .topbar__right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .pill {
            font-weight: 500;
            font-size: 16px;
            color: var(--text);
        }

        .iconBtn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 0;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .iconBtn svg { width: 20px; height: 20px; color: var(--text); }
        .iconBtn img { width: 20px; height: 20px; display: block; }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 9999px;
            background: transparent;
        }

        .profile__avatar {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.22), rgba(17, 24, 39, 0.08));
        }

        .profile__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile__name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
        }

        .profile__dropdown {
            width: 18px;
            height: 18px;
            display: block;
            opacity: 0.65;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 18px 20px;
        }

        .metric__label {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            margin: 0 0 10px;
        }

        .metric__value {
            font-weight: 800;
            font-size: 44px;
            line-height: 1;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 18px;
            align-items: start;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .card__title {
            margin: 0 0 14px;
            font-weight: 700;
            font-size: 18px;
        }

        .chartBox {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(17, 24, 39, 0.06);
        }

        .chartSvg {
            width: 100%;
            height: 240px;
            display: block;
        }

        .donutWrap {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .legend {
            display: grid;
            gap: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        .legend__item { display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 9999px; }

        .table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 18px;
            background: #ffffff;
            border: 1px solid rgba(17, 24, 39, 0.06);
        }

        .table th, .table td {
            padding: 14px 14px;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }

        .table th {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            border-bottom: 1px solid rgba(17, 24, 39, 0.08);
            background: rgba(243, 246, 249, 0.8);
        }

        .table tr + tr td { border-top: 1px solid rgba(17, 24, 39, 0.06); }

        .muted { color: var(--muted); }

        @media (max-width: 1200px) {
            .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid { grid-template-columns: 1fr; }
            .search { width: 280px; }
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { padding: 18px; }
            .search { width: 100%; flex: 1 1 auto; }
            .pill { display: none; }
        }

        /* Custom Styles cho phần Quản lý Giải đấu */
        .tournament-details {
            background: #fff;
            border-radius: var(--radius-xl);
            padding: 30px;
        }

        .tournament__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .tournament__title {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            color: var(--text);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
        }

        .btn--dark { background: #333; color: #fff; }
        .btn--brand { background: var(--brand); color: #fff; }
        .btn--cyan { background: #00bcd4; color: #fff; }
        .btn--sm { padding: 6px 12px; font-size: 13px; border-radius: 6px; }

        .tabs {
            display: flex;
            gap: 25px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-link {
            padding: 12px 0;
            color: var(--brand);
            font-weight: 500;
            text-decoration: none;
            position: relative;
        }

        .tab-link.active {
            color: #333;
            font-weight: 600;
        }

        .tab-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #333;
        }

        .action-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .footer-copyright {
            margin-top: 30px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            color: var(--muted);
            font-size: 14px;
            border-radius: 8px;
        }

        .info-list {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            display: grid;
            grid-template-columns: 150px 1fr;
            align-items: center;
        }

        .info-label {
            font-weight: 700;
            font-size: 16px;
            color: #111827;
        }

        .info-value {
            font-size: 16px;
            color: #4b5563;
        }


    </style>
</head>
<body>
<div class="app" th:with="activePage='manage', activeSubPage='tournament', activeTab='info'">
    <aside th:replace="~{admin/fragments_admin/sidebar :: sidebar}"></aside>

    <main class="content">
        <header th:replace="~{admin/fragments_admin/header :: header}"></header>

        <div class="tournament-details" style="background-color: #e6ecec;">
            <div class="tournament__header">
                <h1 class="tournament__title" th:text="'CHI TIẾT GIẢI ĐẤU: ' + ${tournamentName}">CHI TIẾT GIẢI ĐẤU: Hutech mở rộng lần 31</h1>
            </div>


            <div class="tabs">
                <a th:href="@{/admin/general-information}"
                   class="tab-link"
                   th:classappend="${activeTab == 'info' ? 'active' : ''}">
                    Thông tin chung
                </a>

                <a th:href="@{/admin/team-list}"
                   class="tab-link"
                   th:classappend="${activeTab == 'teams' ? 'active' : ''}">
                    Danh sách đội
                </a>

                <a th:href="@{/admin/match-history}"
                   class="tab-link"
                   th:classappend="${activeTab == 'matches' ? 'active' : ''}">
                    Lịch thi đấu
                </a>

                <a href="#" class="tab-link">
                    Sơ đồ thi đấu
                </a>
            </div>

            <div class="info-list">
                <div class="info-item">
                    <div class="info-label">Ban tổ chức:</div>
                    <div class="info-value" th:text="${organizerName} ?: 'Nguyễn Nhật Hào'">Nguyễn Nhật Hào</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Chế độ:</div>
                    <div class="info-value" th:text="${mode} ?: 'Knockout'">Knockout</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Đội:</div>
                    <div class="info-value" th:text="${teamFormat} ?: '4 v 4'">4 v 4</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Trạng thái:</div>
                    <div class="info-value" th:text="${status} ?: 'Hoàn thành'">Hoàn thành</div>
                </div>
                <div class="info-item" style="align-items: flex-start;">
                    <div class="info-label">Mô tả:</div>
                    <div class="info-value" th:text="${description} ?: 'aaaaaaaaaaa'">aaaaaaaaaaa</div>
                </div>
            </div>
        </div>

        <div class="footer-copyright" th:replace="~{admin/fragments_admin/footer :: footer}"></div>
    </main>
</div>

<script>
    (function () {
        const input = document.getElementById('teamSearch');
        const tbody = document.getElementById('teamTbody');
        if (!input || !tbody) return;

        function normalize(text) {
            return (text || '').toString().toLowerCase().trim();
        }

        function filterRows() {
            const q = normalize(input.value);
            const rows = Array.from(tbody.querySelectorAll('tr'));
            for (const row of rows) {
                const rowText = normalize(row.textContent);
                row.style.display = q === '' || rowText.includes(q) ? '' : 'none';
            }
        }

        input.addEventListener('input', filterRows);
    })();
</script>
</body>
</html>
