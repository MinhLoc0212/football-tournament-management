<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f3f6f9;
            --border: #d9d9d9;
            --text: #111827;
            --muted: #6b7280;
            --muted-2: #b3b3b3;
            --brand: #009cff;
            --radius-xl: 25px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            color: var(--text);
            background: var(--bg);
        }

        .app {
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 300px;
            padding: 24px 18px;
            border-right: 1px solid rgba(17, 24, 39, 0.06);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        .sidebar__brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 14px;
            border-radius: var(--radius-lg);
            background: var(--surface);
            margin: 0 6px 18px;
        }

        .sidebar__brandIcon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.18), rgba(0, 156, 255, 0.06));
            display: grid;
            place-items: center;
        }

        .sidebar__brandIcon svg { width: 26px; height: 26px; }

        .sidebar__brandTitle {
            font-weight: 700;
            font-size: 18px;
            line-height: 1.2;
        }

        .sidebar__sectionTitle {
            margin: 22px 12px 10px;
            font-weight: 600;
            font-size: 16px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 6px;
        }

        .nav__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 12px;
            border-radius: var(--radius-lg);
            text-decoration: none;
            color: var(--text);
        }

        .nav__item:hover {
            background: rgba(243, 246, 249, 0.8);
        }

        .nav__item--active {
            background: var(--surface);
        }

        .nav__icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            overflow: hidden;
            flex: 0 0 auto;
            background: rgba(17, 24, 39, 0.06);
            display: grid;
            place-items: center;
        }

        .nav__icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .nav__iconImg--left {
            object-position: left center;
        }

        .nav__icon svg { width: 22px; height: 22px; }

        .nav__label {
            font-weight: 500;
            font-size: 16px;
        }

        .nav__item--large {
            padding: 10px 12px;
        }

        .nav__icon--large {
            width: 71px;
            height: 71px;
            border-radius: 20px;
            background: var(--surface);
        }

        .nav__label--large {
            font-weight: 600;
            font-size: 18px;
        }

        .nav__chevron {
            margin-left: auto;
            width: 18px;
            height: 18px;
            opacity: 0.55;
        }

        .sidebar__footer {
            margin-top: auto;
            padding: 0 6px;
        }

        .content {
            flex: 1 1 auto;
            padding: 28px 32px;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 26px;
        }

        .topbar__menuBtn {
            width: 44px;
            height: 44px;
            border: 0;
            background: transparent;
            display: grid;
            place-items: center;
            padding: 0;
            cursor: pointer;
        }

        .topbar__menuBtn img {
            width: 30px;
            height: 30px;
            display: block;
        }

        .search {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            width: 320px;
            height: 62px;
            border-radius: 9999px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .search svg { width: 18px; height: 18px; color: var(--muted-2); }

        .search input {
            border: 0;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            color: var(--text);
        }

        .search input::placeholder { color: var(--muted-2); }

        .topbar__right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .pill {
            font-weight: 500;
            font-size: 16px;
            color: var(--text);
        }

        .iconBtn {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--surface);
            border: 0;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .iconBtn svg { width: 20px; height: 20px; color: var(--text); }
        .iconBtn img { width: 20px; height: 20px; display: block; }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 9999px;
            background: transparent;
        }

        .profile__avatar {
            width: 44px;
            height: 44px;
            border-radius: 9999px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 156, 255, 0.22), rgba(17, 24, 39, 0.08));
        }

        .profile__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile__name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
        }

        .profile__dropdown {
            width: 18px;
            height: 18px;
            display: block;
            opacity: 0.65;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 18px 20px;
        }

        .metric__label {
            font-weight: 600;
            font-size: 16px;
            color: var(--text);
            margin: 0 0 10px;
        }

        .metric__value {
            font-weight: 800;
            font-size: 44px;
            line-height: 1;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.4fr 0.9fr;
            gap: 18px;
            align-items: start;
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .card__title {
            margin: 0 0 14px;
            font-weight: 700;
            font-size: 18px;
        }

        .chartBox {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(17, 24, 39, 0.06);
        }

        .chartSvg {
            width: 100%;
            height: 240px;
            display: block;
        }

        .donutWrap {
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .legend {
            display: grid;
            gap: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        .legend__item { display: flex; align-items: center; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 9999px; }

        .table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 18px;
            background: #ffffff;
            border: 1px solid rgba(17, 24, 39, 0.06);
        }

        .table th, .table td {
            padding: 14px 14px;
            text-align: left;
            font-size: 14px;
            white-space: nowrap;
        }

        .table th {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            border-bottom: 1px solid rgba(17, 24, 39, 0.08);
            background: rgba(243, 246, 249, 0.8);
        }

        .table tr + tr td { border-top: 1px solid rgba(17, 24, 39, 0.06); }

        .muted { color: var(--muted); }

        @media (max-width: 1200px) {
            .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid { grid-template-columns: 1fr; }
            .search { width: 280px; }
        }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .content { padding: 18px; }
            .search { width: 100%; flex: 1 1 auto; }
            .pill { display: none; }
        }
    </style>
</head>
<body>
<div class="app" th:with="activePage='dashboard'">
    <aside th:replace="~{admin/fragments_admin/sidebar :: sidebar}"></aside>

    <main class="content">
        <header th:replace="~{admin/fragments_admin/header :: header}"></header>

        <section class="metrics" aria-label="Tổng quan">
            <div class="card">
                <p class="metric__label">Tổng số giải đấu</p>
                <p class="metric__value" th:text="${totalTournaments}">15</p>
            </div>
            <div class="card">
                <p class="metric__label">Tổng số đội bóng</p>
                <p class="metric__value" th:text="${totalTeams}">15</p>
            </div>
            <div class="card">
                <p class="metric__label">Số giải đang diễn ra</p>
                <p class="metric__value" th:text="${activeTournaments}">15</p>
            </div>
            <div class="card">
                <p class="metric__label">Số giải đã hoàn thành</p>
                <p class="metric__value" th:text="${completedTournaments}">15</p>
            </div>
        </section>

        <section class="grid" aria-label="Biểu đồ và bảng">
            <div class="card">
                <h2 class="card__title">Tần suất trận đấu</h2>
                <div class="chartBox">
                    <svg class="chartSvg" id="matchFrequencyChart" viewBox="0 0 700 240" preserveAspectRatio="none" role="img" aria-label="Biểu đồ đường">
                        <defs>
                            <linearGradient id="lineFill" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0" stop-color="#009CFF" stop-opacity="0.28"/>
                                <stop offset="1" stop-color="#009CFF" stop-opacity="0.02"/>
                            </linearGradient>
                        </defs>
                        <path d="M40 20v190h640" stroke="rgba(17,24,39,0.15)" stroke-width="2" fill="none"/>
                        <!-- Path and circles will be generated by JS -->
                        <path id="chartPath" d="" stroke="#009CFF" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <path id="chartArea" d="" fill="url(#lineFill)"/>
                        <g id="chartPoints"></g>
                    </svg>
                </div>
            </div>

            <div class="card">
                <h2 class="card__title">Các đội đã dành chức vô địch</h2>
                <table class="table" aria-label="Bảng đội vô địch">
                    <thead>
                    <tr>
                        <th style="width: 52px;">#</th>
                        <th>Tên đội</th>
                        <th>Giải</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t, iter : ${recentWinners}">
                        <td class="muted" th:text="${iter.count}">1</td>
                        <td th:text="${t.winner.name}">FC Test 196267</td>
                        <td th:text="${t.name}">Hutech mở rộng lần 1</td>
                    </tr>
                    <tr th:if="${recentWinners.empty}">
                        <td colspan="3" class="muted" style="text-align: center;">Chưa có dữ liệu</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <footer th:replace="~{admin/fragments_admin/footer :: footer}"></footer>
    </main>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const matchFrequency = /*[[${matchFrequency}]]*/ [];
    
    function drawChart() {
        const svg = document.getElementById('matchFrequencyChart');
        const path = document.getElementById('chartPath');
        const area = document.getElementById('chartArea');
        const pointsGroup = document.getElementById('chartPoints');
        
        if (!matchFrequency || matchFrequency.length === 0) return;
        
        const paddingLeft = 40;
        const paddingRight = 20;
        const paddingTop = 40;
        const paddingBottom = 30;
        const width = 700 - paddingLeft - paddingRight;
        const height = 240 - paddingTop - paddingBottom;
        
        const maxVal = Math.max(...matchFrequency, 10); // Ensure at least 10 for scale
        const stepX = width / (matchFrequency.length - 1);
        
        let d = '';
        let areaD = '';
        pointsGroup.innerHTML = '';
        
        matchFrequency.forEach((val, i) => {
            const x = paddingLeft + i * stepX;
            const y = (240 - paddingBottom) - (val / maxVal) * height;
            
            if (i === 0) {
                d += `M ${x} ${y}`;
                areaD += `M ${x} ${240 - paddingBottom} L ${x} ${y}`;
            } else {
                // Using simple lines for now, can be improved to curves
                d += ` L ${x} ${y}`;
                areaD += ` L ${x} ${y}`;
            }
            
            // Add point circle
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y);
            circle.setAttribute("r", "5");
            circle.setAttribute("fill", "#009CFF");
            pointsGroup.appendChild(circle);
            
            // Add tooltip (optional, simple text for now)
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", y - 10);
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-size", "12");
            text.setAttribute("fill", "var(--muted)");
            text.textContent = val;
            pointsGroup.appendChild(text);
        });
        
        areaD += ` L ${paddingLeft + (matchFrequency.length - 1) * stepX} ${240 - paddingBottom} Z`;
        
        path.setAttribute('d', d);
        area.setAttribute('d', areaD);
    }
    
    document.addEventListener('DOMContentLoaded', drawChart);
    /*]]>*/
</script>
</body>
</html>
